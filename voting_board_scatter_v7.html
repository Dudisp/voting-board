
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.board-wrap { padding: 1.25rem; background: var(--color-background-tertiary); border-radius: var(--border-radius-lg); }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.topbar-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.topbar-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.post-btn { display: flex; align-items: center; gap: 5px; background: #185FA5; color: #E6F1FB; border: none; border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.table { position: relative; width: 100%; height: 880px; background: #eae6de; border-radius: 10px; overflow: hidden; }
.table::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,0.035) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,0,0,0.035) 40px); border-radius: 10px; }
.note { position: absolute; border-radius: 4px; padding: 12px 13px 10px; cursor: pointer; transition: transform 0.18s ease, box-shadow 0.18s ease; user-select: none; box-shadow: 3px 4px 12px rgba(0,0,0,0.18), 1px 1px 3px rgba(0,0,0,0.09); }
.note:hover { box-shadow: 6px 10px 24px rgba(0,0,0,0.3); transform: var(--rot) scale(1.07) !important; z-index: 200 !important; }
.note::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: rgba(0,0,0,0.07); border-radius: 4px 4px 0 0; }
.note-rank { font-size: 10px; font-weight: 600; opacity: 0.4; margin-bottom: 4px; }
.note-content { font-weight: 500; line-height: 1.35; color: rgba(0,0,0,0.76); }
.note-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.note-time { font-size: 10px; color: rgba(0,0,0,0.38); }
.vote-btn { display: flex; align-items: center; gap: 3px; background: rgba(255,255,255,0.55); border: 1.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 4px 10px 4px 8px; font-size: 13px; font-weight: 700; color: rgba(0,0,0,0.6); cursor: pointer; }
.vote-btn:hover { background: rgba(255,255,255,0.8); }
.vote-btn.active { background: rgba(255,255,255,0.75); color: rgba(0,0,0,0.8); }
</style>

<h2 class="sr-only">Voting board sticky notes. #1 centered, #2–10 around it, #11–15 slightly overlapping the bottom of the cluster, #16–20 scattered below.</h2>

<div class="board-wrap">
  <div class="topbar">
    <div>
      <div class="topbar-title">Voting Board</div>
      <div class="topbar-sub">Post something short. Upvote what matters.</div>
    </div>
    <button class="post-btn"><i class="ti ti-plus" aria-hidden="true"></i> New post</button>
  </div>
  <div class="table" id="table"></div>
</div>

<script>
const posts = [
  { rank:1,  content:"This post has the most votes and gets the biggest sticky note", votes:24, time:"25m ago", color:"#fff9a3", w:225, h:195 },
  { rank:2,  content:"Second place, still a solid note size", votes:11, time:"10m ago", color:"#b8f0b8", w:198, h:172 },
  { rank:3,  content:"Third here, doing alright", votes:8,  time:"4m ago",  color:"#ffc8c8", w:185, h:160 },
  { rank:4,  content:"Mid-tier post with decent votes", votes:6,  time:"8m ago",  color:"#c8e8ff", w:178, h:154 },
  { rank:5,  content:"Another post hanging around", votes:5,  time:"3m ago",  color:"#ffd9a0", w:172, h:150 },
  { rank:6,  content:"Trying to climb", votes:4,  time:"2m ago",  color:"#e8c8ff", w:165, h:144 },
  { rank:7,  content:"Still going", votes:3,  time:"90s ago", color:"#fff9a3", w:160, h:140 },
  { rank:8,  content:"Just posted", votes:2,  time:"1m ago",  color:"#b8f0b8", w:154, h:134 },
  { rank:9,  content:"Catching up", votes:1,  time:"40s ago", color:"#ffc8c8", w:148, h:128 },
  { rank:10, content:"New arrival", votes:1,  time:"20s ago", color:"#c8e8ff", w:142, h:122 },
  { rank:11, content:"Fresh note",  votes:0,  time:"now",     color:"#ffd9a0", w:138, h:116 },
  { rank:12, content:"Just joined", votes:0,  time:"now",     color:"#e8c8ff", w:134, h:113 },
  { rank:13, content:"Brand new",   votes:0,  time:"now",     color:"#fff9a3", w:130, h:110 },
  { rank:14, content:"Hello world", votes:0,  time:"now",     color:"#b8f0b8", w:126, h:107 },
  { rank:15, content:"Hi there",    votes:0,  time:"now",     color:"#ffc8c8", w:122, h:104 },
  { rank:16, content:"Newcomer",    votes:0,  time:"now",     color:"#c8e8ff", w:102, h:88 },
  { rank:17, content:"Just arrived",votes:0,  time:"now",     color:"#ffd9a0", w:98,  h:85 },
  { rank:18, content:"Testing",     votes:0,  time:"now",     color:"#e8c8ff", w:95,  h:82 },
  { rank:19, content:"Hello",       votes:0,  time:"now",     color:"#fff9a3", w:92,  h:80 },
  { rank:20, content:"First post",  votes:0,  time:"now",     color:"#b8f0b8", w:90,  h:78 },
];

const tableW = 620;
const cx = tableW / 2;
const c1 = posts[0];
const centerX = cx - c1.w / 2;
const centerY = 260 - c1.h / 2;

// #2–10 around the center
const surroundPos = [
  { x: 8,   y: 15  },  // #2
  { x: 408, y: 18  },  // #3
  { x: 4,   y: 310 },  // #4
  { x: 205, y: 8   },  // #5
  { x: 420, y: 285 },  // #6
  { x: 20,  y: 175 },  // #7
  { x: 448, y: 155 },  // #8
  { x: 188, y: 368 },  // #9
  { x: 418, y: 390 },  // #10
];

// #11–15: raised to overlap bottom edge of cluster (~y 460–490)
const midPos = [
  { x: 12,  y: 468 },
  { x: 154, y: 478 },
  { x: 295, y: 462 },
  { x: 432, y: 472 },
  { x: 502, y: 455 },
];

// #16–20: smaller, below the mid row
const bottomPos = [
  { x: 30,  y: 618 },
  { x: 148, y: 630 },
  { x: 272, y: 614 },
  { x: 400, y: 626 },
  { x: 514, y: 610 },
];

const rotations = [-2.8, 3.4, -3.9, 2.2, -4.5, 3.8, -1.7, 4.2, -2.5, 3.1, -3.6, 2.7, -4.1, 1.9, -3.2, 2.5, -4.3, 3.0, -2.1, 4.6];

const allPos = [{ x: centerX, y: centerY }];
surroundPos.forEach(p => allPos.push(p));
midPos.forEach(p => allPos.push(p));
bottomPos.forEach(p => allPos.push(p));

const table = document.getElementById('table');

[...posts].reverse().forEach((p, ri) => {
  const i = posts.length - 1 - ri;
  const pos = allPos[i];
  const rot = rotations[i];
  const fontSize = p.rank === 1 ? '17px' : p.rank <= 3 ? '15px' : p.rank <= 7 ? '14px' : p.rank <= 10 ? '13px' : p.rank <= 15 ? '12px' : '11px';

  const el = document.createElement('div');
  el.className = 'note';
  el.style.cssText = `left:${Math.round(pos.x)}px;top:${Math.round(pos.y)}px;width:${p.w}px;min-height:${p.h}px;background:${p.color};--rot:rotate(${rot}deg);transform:rotate(${rot}deg);z-index:${25 - p.rank};`;
  el.innerHTML = `
    <div class="note-rank">#${p.rank}</div>
    <div class="note-content" style="font-size:${fontSize}">${p.content}</div>
    <div class="note-meta">
      <span class="note-time">${p.time}</span>
      <button class="vote-btn${p.rank===1?' active':''}">🚀 ${p.votes}</button>
    </div>
  `;
  table.appendChild(el);
});
</script>
